<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Flappy Kuş</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: #71c5cf;
      font-family: Arial, sans-serif;
      touch-action: manipulation;
    }
    canvas {
      display: block;
    }
    #ui {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      color: white;
      text-shadow: 2px 2px 4px #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 5vw;
    }
    #score {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10vw;
      font-weight: bold;
    }
    #start-screen, #game-over {
      background: rgba(0,0,0,0.5);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      pointer-events: all;
    }
    button {
      margin-top: 20px;
      padding: 15px 40px;
      font-size: 6vw;
      background: #ffcc00;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="score">0</div>
  
  <div id="start-screen">
    <h1>Flappy Kuş</h1>
    <p>Ekranı dokun / boşluk tuşuna bas</p>
    <button onclick="startGame()">BAŞLA</button>
  </div>

  <div id="game-over" style="display:none">
    <h1>Game Over</h1>
    <p>Skor: <span id="final-score">0</span></p>
    <button onclick="resetGame()">Tekrar Oyna</button>
  </div>
</div>

<script>
// ================ AYARLAR ================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let cw, ch;
function resize() {
  cw = canvas.width = window.innerWidth;
  ch = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Oyun değişkenleri
let bird = { x: 120, y: ch/2, vy: 0, size: 34, gravity: 0.6, jump: -11 };
let pipes = [];
let score = 0;
let gameRunning = false;
let frame = 0;

// Skor elementi
const scoreEl = document.getElementById('score');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over');
const finalScoreEl = document.getElementById('final-score');

// Dokunmatik + klavye kontrol
function flap() {
  if (!gameRunning) return;
  bird.vy = bird.jump;
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'KeyS') {
    e.preventDefault();
    flap();
  }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  flap();
});
canvas.addEventListener('click', flap); // masaüstü için de

// Yeni boru ekle
function addPipe() {
  const gap = 180 + Math.random() * 40;
  const minHeight = 100;
  const maxHeight = ch - gap - minHeight;
  const h = minHeight + Math.random() * (maxHeight - minHeight);
  
  pipes.push({
    x: cw,
    top: h,
    bottom: ch - (h + gap),
    passed: false
  });
}

// Çarpışma kontrolü
function checkCollision() {
  if (bird.y < 0 || bird.y + bird.size > ch) return true;

  for (let p of pipes) {
    // Üst boru
    if (bird.x + bird.size > p.x && bird.x < p.x + 70) {
      if (bird.y < p.top || bird.y + bird.size > ch - p.bottom) {
        return true;
      }
    }
  }
  return false;
}

// Oyun döngüsü
function loop() {
  ctx.fillStyle = "#71c5cf";
  ctx.fillRect(0, 0, cw, ch);

  // Zemin efekti (basit)
  ctx.fillStyle = "#5db060";
  ctx.fillRect(0, ch-60, cw, 60);

  // Kuş
  bird.vy += bird.gravity;
  bird.y += bird.vy;

  ctx.fillStyle = "#ffcc00";
  ctx.beginPath();
  ctx.arc(bird.x, bird.y + bird.size/2, bird.size/2, 0, Math.PI*2);
  ctx.fill();

  // Göz
  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.arc(bird.x + 12, bird.y + 12, 6, 0, Math.PI*2);
  ctx.fill();

  // Borular
  if (gameRunning) {
    frame++;
    if (frame % 110 === 0) addPipe();

    for (let i = pipes.length-1; i >= 0; i--) {
      let p = pipes[i];
      p.x -= 2.8;

      // Üst boru
      ctx.fillStyle = "#569c56";
      ctx.fillRect(p.x, 0, 70, p.top);
      // Alt boru
      ctx.fillRect(p.x, ch - p.bottom, 70, p.bottom);

      // Skor geçme
      if (!p.passed && p.x + 70 < bird.x) {
        p.passed = true;
        score++;
        scoreEl.textContent = score;
      }

      // Ekran dışına çıkanları sil
      if (p.x < -80) pipes.splice(i,1);
    }
  }

  // Çarpışma + game over
  if (gameRunning && checkCollision()) {
    gameRunning = false;
    finalScoreEl.textContent = score;
    gameOverScreen.style.display = 'block';
  }

  requestAnimationFrame(loop);
}

// Başlat / sıfırla
function startGame() {
  startScreen.style.display = 'none';
  gameOverScreen.style.display = 'none';
  gameRunning = true;
  score = 0;
  scoreEl.textContent = "0";
  bird.y = ch/2;
  bird.vy = 0;
  pipes = [];
  frame = 0;
}

function resetGame() {
  startGame();
}

// İlk boruyu biraz gecikmeyle ekle
setTimeout(() => {
  if (gameRunning) addPipe();
}, 1500);

loop();
</script>
</body>
</html>
