<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>NoPain Clan</title>

<style>
body {
    margin: 0;
    background: black;
    color: red;
    font-family: Arial, sans-serif;
}

/* Üst bar */
.header {
    width: 100%;
    height: 100px;
    position: relative;
}

/* Sağ üst GIF */
.gif {
    position: absolute;
    right: 10px;
    top: 10px;
}

.gif img {
    width: 120px;
    border: 2px solid red;
}

/* Sol oyuncu paneli */
.sidebar {
    position: absolute;
    left: 0;
    top: 100px;
    width: 250px;
    height: calc(100vh - 100px);
    background: #0a0a0a;
    border-right: 2px solid red;
    padding: 10px;
}

/* Oyuncu isimleri */
.player {
    margin: 10px 0;
    padding: 5px;
    border-bottom: 1px solid red;
    transition: 0.3s;
}

.player:hover {
    color: white;
    text-shadow: 0 0 10px red;
}

/* Ana alan */
.main {
    margin-left: 260px;
    padding: 20px;
}

/* Başlık */
.title {
    font-size: 40px;
    text-shadow: 0 0 20px red;
}
</style>

</head>
<body>

<div class="header">
    <div class="gif">
        <!-- BURAYA GIF LINKİ KOY -->
        <img src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif">
    </div>
</div>

<div class="sidebar">
    <div class="player">~KATR3OS'nP+</div>
    <div class="player">#Ya[R]Jamaz'nP+</div>
    <div class="player">Samurai'nP+</div>
    <div class="player">#SLOWS3EXX'nP+</div>
    <div class="player">#bihter'nP+</div>
    <div class="player">Javeyskal'nP+</div>
    <div class="player">AidronLE'nP+</div>
</div>

<div class="main">
    <div class="title">NoPain Clan</div>
    <p>Fear the pain. Respect the power.</p>
</div>

</body>
</html>
