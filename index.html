<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@k4treos</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Cinzel|Nunito|Poiret+One');
        body, html {
            height: 100%;
            background: black;
            position: relative;
            margin: 0;
            overflow: hidden;
            color: white;
            font-family: 'Cinzel', serif;
        }
        #particles-js {
            width: 100%;
            height: 100%;
            background: black;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .center-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            width: 100%;
        }
        h1 {
            font-size: 5em;
            letter-spacing: 0.35em;
            text-shadow: 0 0 25px rgba(255,255,255,.85);
            animation: rotate 20s linear infinite, glow 2s infinite alternate;
            margin-bottom: 20px;
        }
        .nickname {
            font-size: 8em;
            letter-spacing: 0.2em;
            text-shadow: 0 0 40px rgba(255,255,255,.9);
            animation: glow 3s infinite alternate, pulse 4s infinite;
            margin: 80px 0;
        }
        @keyframes rotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px white; }
            to { text-shadow: 0 0 50px white; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        iframe { display: none; }
        p {
            font-size: 2em;
            letter-spacing: 0.2em;
            margin-top: 50px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>
    
    <!-- ZULU şarkı 0-12 saniye çalıyor -->
    <iframe src="https://www.youtube.com/embed/tSf6IV0HDpQ?autoplay=1&start=0&end=12&mute=0" allow="autoplay"></iframe>
    
    <div class="center-content">
        <h1>@k4treos :)</h1>
        <div class="nickname"></div>
        <p>Easy</p>
    </div>

    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 5, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 4, "direction": "none", "random": false, "straight": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "repulse" }, "onclick": { "enable": true, "mode": "push" } }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>https://www.youtube.com/watch?v=Ct6BUPvE2sM&list=RDCt6BUPvE2sM&start_radio=1
